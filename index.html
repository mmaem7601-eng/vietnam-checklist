<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

  <title>떠나요, 푸꾸옥</title>

  <!-- 미리보기 기본 정보 -->
  <meta name="description" content="푸꾸옥 여행 준비 체크리스트입니다." />

  <!-- 카카오톡, 문자, 메신저 미리보기 설정 -->
  <meta property="og:type" content="website" />
  <meta property="og:title" content="Vietnam Checklist" />
  <meta property="og:description" content="여기를 눌러 링크를 확인하세요." />
  <meta property="og:image" content="https://mmaem7601-eng.github.io/trip/og-image.jpg" />
  <meta property="og:url" content="https://mmaem7601-eng.github.io/trip/" />

  <!-- 트위터/X 미리보기 설정 -->
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="Vietnam Checklist" />
  <meta name="twitter:description" content="여기를 눌러 링크를 확인하세요." />
  <meta name="twitter:image" content="https://mmaem7601-eng.github.io/trip/og-image.jpg" />

  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <!-- 1페이지: 풀스크린 이미지 -->
  <section class="slide slide-intro active" id="slide1">
    <img class="intro-image" src="main-image.jpg" alt="푸꾸옥 여행 이미지" />
    <div class="intro-bottom-gradient"></div>

    <div class="intro-nav">
      <button type="button" id="introNextBtn">체크리스트 보기</button>
    </div>
  </section>

  <!-- 2페이지: 체크리스트 -->
  <section class="slide slide-checklist" id="slide2">
    <main class="page">
      <section class="app-card">
        <div class="top-bar">
          <div>
            <div class="badge">Vietnam Trip</div>
            <h1>푸꾸옥 여행 준비</h1>
          </div>

          <div class="slide-indicator">
            <span>2</span>
            <span>/</span>
            <span>2</span>
          </div>
        </div>

        <p class="description">
          여행 전 챙겨야 할 준비물을 카테고리별로 확인해보세요.
        </p>

        <div class="legend">
          <span class="legend-item jinkyu-dot">진규가 챙길 것</span>
          <span class="legend-item minkyoung-dot">민경이 챙길 것</span>
        </div>

        <section class="category">
          <h2>필수준비물</h2>

          <div class="checklist">
            <label class="check-item">
              <input type="checkbox" data-id="passport" />
              <span>여권</span>
            </label>

            <label class="check-item jinkyu">
              <input type="checkbox" data-id="esim" />
              <span>e심 <strong>[진규]</strong></span>
            </label>

            <label class="check-item">
              <input type="checkbox" data-id="insurance" />
              <span>보험증</span>
            </label>

            <label class="check-item">
              <input type="checkbox" data-id="flight-ticket" />
              <span>항공권(스마트패스)</span>
            </label>

            <label class="check-item minkyoung">
              <input type="checkbox" data-id="travel-card" />
              <span>트래블로그 하나카드 <strong>[민경]</strong></span>
            </label>

            <label class="check-item jinkyu">
              <input type="checkbox" data-id="medicine" />
              <span>의약품(배탈약, 소화제) <strong>[진규]</strong></span>
            </label>

            <label class="check-item">
              <input type="checkbox" data-id="adapter" />
              <span>어댑터(3개 가져감)</span>
            </label>

            <label class="check-item">
              <input type="checkbox" data-id="charger" />
              <span>충전기(라이트닝/C/워치)</span>
            </label>

            <label class="check-item">
              <input type="checkbox" data-id="battery" />
              <span>보조배터리</span>
            </label>

            <label class="check-item">
              <input type="checkbox" data-id="small-bag" />
              <span>휴대가방(매는거)</span>
            </label>

            <label class="check-item">
              <input type="checkbox" data-id="glasses" />
              <span>안경</span>
            </label>

            <label class="check-item">
              <input type="checkbox" data-id="sunglasses" />
              <span>썬글라스</span>
            </label>

            <label class="check-item">
              <input type="checkbox" data-id="flipflops" />
              <span>쪼리</span>
            </label>

            <label class="check-item">
              <input type="checkbox" data-id="swimsuit" />
              <span>수영복</span>
            </label>

            <label class="check-item">
              <input type="checkbox" data-id="goggles" />
              <span>수경</span>
            </label>

            <label class="check-item">
              <input type="checkbox" data-id="eye-drops" />
              <span>인공눈물</span>
            </label>

            <label class="check-item jinkyu">
              <input type="checkbox" data-id="pocket4" />
              <span>포켓4 <strong>[진규]</strong></span>
            </label>

            <label class="check-item">
              <input type="checkbox" data-id="bug-spray" />
              <span>모기기피제</span>
            </label>

            <label class="check-item minkyoung">
              <input type="checkbox" data-id="shower-filter" />
              <span>샤워기/필터 <strong>[민경]</strong></span>
            </label>

            <label class="check-item minkyoung">
              <input type="checkbox" data-id="umbrella" />
              <span>우양산 <strong>[민경]</strong></span>
            </label>

            <label class="check-item">
              <input type="checkbox" data-id="cap" />
              <span>캡모자</span>
            </label>

            <label class="check-item jinkyu">
              <input type="checkbox" data-id="waterproof-pack" />
              <span>방수팩 2개 <strong>[진규]</strong></span>
            </label>

            <label class="check-item optional">
              <input type="checkbox" data-id="eye-mask" />
              <span>안대 <em>필수 아님</em></span>
            </label>
          </div>
        </section>

        <section class="category">
          <h2>화장/세면용품</h2>

          <div class="checklist">
            <label class="check-item">
              <input type="checkbox" data-id="cleansing-foam" />
              <span>클렌징폼</span>
            </label>

            <label class="check-item jinkyu">
              <input type="checkbox" data-id="cleansing-oil" />
              <span>클렌징오일 <strong>[진규]</strong></span>
            </label>

            <label class="check-item">
              <input type="checkbox" data-id="toothbrush" />
              <span>칫솔</span>
            </label>

            <label class="check-item jinkyu">
              <input type="checkbox" data-id="razor" />
              <span>면도기 <strong>[진규]</strong></span>
            </label>

            <label class="check-item jinkyu">
              <input type="checkbox" data-id="shaving-gel" />
              <span>면도젤 <strong>[진규]</strong></span>
            </label>

            <label class="check-item">
              <input type="checkbox" data-id="shampoo" />
              <span>샴푸</span>
            </label>

            <label class="check-item jinkyu">
              <input type="checkbox" data-id="shower-towel" />
              <span>샤워타월 <strong>[진규]</strong></span>
            </label>

            <label class="check-item jinkyu">
              <input type="checkbox" data-id="concealer" />
              <span>컨실러 <strong>[진규]</strong></span>
            </label>

            <label class="check-item">
              <input type="checkbox" data-id="lotion" />
              <span>로션</span>
            </label>

            <label class="check-item">
              <input type="checkbox" data-id="sunscreen" />
              <span>선크림</span>
            </label>

            <label class="check-item">
              <input type="checkbox" data-id="perfume" />
              <span>향수</span>
            </label>

            <label class="check-item">
              <input type="checkbox" data-id="lens" />
              <span>렌즈 5쌍 + 1쌍 착용</span>
            </label>
          </div>
        </section>

        <section class="category">
          <h2>의류</h2>

          <div class="checklist">
            <label class="check-item">
              <input type="checkbox" data-id="day1-outfit" />
              <span>1일차(공항룩)</span>
            </label>

            <div class="outfit-card">
              <div class="outfit-title">2일차 코디</div>

              <label class="check-item minkyoung">
                <input type="checkbox" data-id="day2-minkyoung" />
                <span>초록체크 + 린넨바지 + 하얀 볼레로 <strong>[민경]</strong></span>
              </label>

              <label class="check-item jinkyu">
                <input type="checkbox" data-id="day2-jinkyu" />
                <span>흰색 니트 반팔 + 린넨바지 <strong>[진규]</strong></span>
              </label>
            </div>

            <div class="outfit-card">
              <div class="outfit-title">3일차 코디</div>

              <label class="check-item minkyoung">
                <input type="checkbox" data-id="day3-minkyoung" />
                <span>흰색 원피스 + 하늘색 가디건 <strong>[민경]</strong></span>
              </label>

              <label class="check-item jinkyu">
                <input type="checkbox" data-id="day3-jinkyu" />
                <span>흰색 셔츠 + 갈색 반바지 <strong>[진규]</strong></span>
              </label>
            </div>

            <label class="check-item">
              <input type="checkbox" data-id="day4-outfit" />
              <span>4일차(회색 반팔 + 청반바지)</span>
            </label>

            <label class="check-item">
              <input type="checkbox" data-id="underwear" />
              <span>속옷(여벌 포함)</span>
            </label>

            <label class="check-item">
              <input type="checkbox" data-id="socks" />
              <span>양말 2켤레</span>
            </label>

            <label class="check-item jinkyu">
              <input type="checkbox" data-id="sleeveless" />
              <span>나시 3벌 <strong>[진규]</strong></span>
            </label>

            <label class="check-item">
              <input type="checkbox" data-id="extra-tshirt" />
              <span>여분 반팔</span>
            </label>

            <label class="check-item">
              <input type="checkbox" data-id="extra-shorts" />
              <span>여분 반바지</span>
            </label>
            <label class="check-item">
            <input type="checkbox" data-id="windbreaker-bag" />
            <span>바람막이(가방에)</span>
          </label>
          </div>
        </section>

        <div class="nav-buttons">
          <button type="button" id="prevBtn">이전</button>
          <button type="button" id="nextBtn">처음으로</button>
        </div>
      </section>
    </main>
  </section>

  <script src="script.js"></script>
</body>
</html>
